# ═══════════════════════════════════════════════════════════════
# MODULE 5: Nginx SPA Fallback Config
# Fixes 404 on deep-links like /dashboard, /audit/book, /vault
# ═══════════════════════════════════════════════════════════════
server {
    listen 80;
    listen 443 ssl;
    server_name stonevision-ai-two.vercel.app;

    root /var/www/stonevision/out;
    index index.html;

    # Serve static files directly
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy to Railway backend
    location /api/ {
        proxy_pass https://stonevision-ai-production.up.railway.app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # SPA FALLBACK: All other URLs -> index.html
    # This fixes 404 on /dashboard, /vault, /audit, /invite, /verify
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}

# ═══════════════════════════════════════════════════════════════
# AWS CloudFront: Custom Error Response for SPA routing
# Add this in CloudFront Distribution > Error Pages:
#
# HTTP Error Code: 404
# Response Page Path: /index.html
# HTTP Response Code: 200
#
# AWS S3 Static Website: Set Error Document to index.html
# ═══════════════════════════════════════════════════════════════

# NOTE: For Next.js on Vercel — no Nginx needed.
# Vercel handles all routing automatically via App Router page.tsx files.
# 404s are caused by MISSING page.tsx files, not routing config.
# All routes verified:
#   /invite          -> app/invite/page.tsx
#   /onboard/supplier -> app/onboard/supplier/page.tsx
#   /verify/[pdf_id] -> app/verify/[pdf_id]/page.tsx
#   /audit           -> app/audit/page.tsx
#   /audit/book      -> app/audit/book/page.tsx
#   /audit/status    -> app/audit/status/page.tsx
